<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股市熱力圖 · StockMap</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0a0d12;
    --surface: #111520;
    --border: #1e2535;
    --text: #e2e8f0;
    --muted: #64748b;
    --gain5: #00c853;
    --gain3: #43a047;
    --gain1: #2e7d32;
    --flat: #263238;
    --loss1: #b71c1c;
    --loss3: #c62828;
    --loss5: #e53935;
    --accent: #3b82f6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--gain5);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  #refresh-info {
    font-size: 12px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  #last-updated {
    font-size: 12px;
    color: var(--muted);
  }

  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.2s, background 0.2s;
  }

  .refresh-btn:hover { border-color: var(--accent); background: rgba(59,130,246,0.08); }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 16px 24px 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .tab {
    padding: 8px 20px;
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    border: 1px solid transparent;
    border-bottom: none;
    transition: color 0.2s, background 0.2s;
    background: transparent;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    background: var(--surface);
    border-color: var(--border);
    color: var(--text);
    position: relative;
    bottom: -1px;
  }

  /* ── Legend ── */
  .legend {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 12px 24px;
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  .legend-bar {
    display: flex;
    border-radius: 4px;
    overflow: hidden;
    height: 12px;
  }

  .legend-bar span {
    width: 36px;
    display: inline-block;
  }

  .legend-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; }

  /* ── Main ── */
  main { flex: 1; padding: 20px 24px; }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Heatmap Grid ── */
  .heatmap-container {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-bottom: 28px;
    min-height: 80px;
  }

  .stock-tile {
    border-radius: 6px;
    padding: 8px 10px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    min-width: 70px;
    min-height: 70px;
  }

  .stock-tile::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.03);
    pointer-events: none;
  }

  .stock-tile:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    filter: brightness(1.15);
    z-index: 10;
  }

  .tile-symbol {
    font-size: 11px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: rgba(255,255,255,0.95);
    letter-spacing: 0.3px;
  }

  .tile-name {
    font-size: 9px;
    color: rgba(255,255,255,0.6);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .tile-change {
    font-size: 14px;
    font-weight: 700;
    color: rgba(255,255,255,0.95);
    font-family: 'JetBrains Mono', monospace;
  }

  .tile-price {
    font-size: 9px;
    color: rgba(255,255,255,0.6);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 1px;
  }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    background: #1a2035;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    pointer-events: none;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.15s;
    min-width: 200px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
  }

  #tooltip.visible { opacity: 1; }

  .tt-symbol {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 4px;
  }

  .tt-name { color: var(--muted); font-size: 11px; margin-bottom: 10px; }

  .tt-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 4px;
  }

  .tt-label { color: var(--muted); }

  .tt-val {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
  }

  .tt-val.pos { color: var(--gain5); }
  .tt-val.neg { color: var(--loss5); }

  /* ── Loading / Error ── */
  .loading-overlay {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
    width: 100%;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Stats Bar ── */
  .stats-bar {
    display: flex;
    gap: 24px;
    padding: 12px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .stat-item { display: flex; gap: 6px; align-items: center; }
  .stat-label { color: var(--muted); }
  .stat-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .stat-val.pos { color: var(--gain5); }
  .stat-val.neg { color: var(--loss5); }

  /* ── ETF special badge ── */
  .etf-badge {
    position: absolute;
    top: 5px;
    right: 5px;
    font-size: 7px;
    font-weight: 700;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    padding: 1px 4px;
    letter-spacing: 0.5px;
  }

  /* ── Macro Grid ── */
  .macro-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }

  .macro-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: border-color 0.2s;
  }

  .macro-card:hover { border-color: var(--accent); }

  .macro-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .macro-value {
    font-size: 20px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
  }

  .macro-change {
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
  }

  .macro-change.pos { color: var(--gain5); }
  .macro-change.neg { color: var(--loss5); }
  .macro-change.neu { color: var(--muted); }

  .macro-desc {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── News List ── */
  .news-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .news-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }

  .news-item:hover {
    border-color: var(--accent);
    background: rgba(59,130,246,0.05);
  }

  .news-source-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .badge-reuters { background: #e85d04; color: #fff; }
  .badge-yahoo   { background: #6001d2; color: #fff; }
  .badge-ft      { background: #fff; color: #000; }
  .badge-cnbc    { background: #0057a8; color: #fff; }
  .badge-fed     { background: #1a3a5c; color: #7eb8e8; border: 1px solid #2a5a8c; }

  .news-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: flex-start;
    flex-shrink: 0;
  }

  .news-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
    margin: 3px 0;
  }

  .news-breaking {
    border-color: rgba(239,68,68,0.4) !important;
    background: rgba(239,68,68,0.04) !important;
  }

  .news-breaking:hover {
    border-color: rgba(239,68,68,0.7) !important;
    background: rgba(239,68,68,0.08) !important;
  }

  .news-section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 8px 0 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .news-section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Impact badges upgrade */
  .impact-urgent   { background: rgba(239,68,68,0.25);  color: #f87171; }
  .impact-fed      { background: rgba(59,130,246,0.2);  color: #60a5fa; }
  .impact-geo      { background: rgba(251,146,60,0.2);  color: #fb923c; }
  .impact-trade    { background: rgba(234,179,8,0.2);   color: #facc15; }
  .impact-macro    { background: rgba(168,85,247,0.2);  color: #c084fc; }
  .impact-earnings { background: rgba(34,197,94,0.2);   color: #4ade80; }

  .news-content { flex: 1; }

  .news-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .news-meta {
    font-size: 11px;
    color: var(--muted);
  }

  .news-impact {
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 4px;
    margin-left: 6px;
  }

  .impact-high { background: rgba(229,57,53,0.2); color: #ef5350; }
  .impact-mid  { background: rgba(255,152,0,0.2);  color: #ffa726; }
  .impact-low  { background: rgba(100,116,139,0.2); color: #94a3b8; }
</style>

  if (pct === null || pct === undefined) return '#1e2535';
  if (pct >= 5)  return '#00c853';
  if (pct >= 3)  return '#43a047';
  if (pct >= 1)  return '#2e7d32';

  if (pct >= -3) return '#b71c1c';

function getTileSize(size) {

  if (n === null || isNaN(n)) return '-';
  return isTW ? `NT$${n.toFixed(2)}` : `$${n.toFixed(2)}`;
}

// ── Yahoo Finance proxy (台股用) ──
const YF_PROXY = 'https://query1.finance.yahoo.com/v8/finance/chart/';

async function fetchTWQuote(symbol) {
  // symbol e.g. "2330.TW"
  const proxies = [
    `https://corsproxy.io/?${encodeURIComponent(YF_PROXY + symbol + '?interval=1d&range=2d')}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(YF_PROXY + symbol + '?interval=1d&range=2d')}`,
  ];
  for (const url of proxies) {
    try {
      const r = await fetch(url);
      if (!r.ok) continue;
      const d = await r.json();
      const meta = d?.chart?.result?.[0]?.meta;
      if (!meta || !meta.regularMarketPrice) continue;
      const c  = meta.regularMarketPrice;
      const pc = meta.chartPreviousClose || meta.previousClose || c;
      const o  = meta.regularMarketOpen || c;
      const h  = meta.regularMarketDayHigh || c;
      const l  = meta.regularMarketDayLow  || c;
      return { c, pc, o, h, l };
    } catch { continue; }
  }
  return null;
}

// ── Finnhub (美股用) ──
async function fetchUSQuote(symbol) {
  try {
    const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${API_KEY}`);
    const d = await r.json();
    if (d && d.c && d.c !== 0) return d;
    return null;
  } catch { return null; }
}

async function fetchAll() {
  ['heatmap-tw','heatmap-tw-etf','heatmap-us'].forEach(id => {
    document.getElementById(id).innerHTML =
      `<div class="loading-overlay"><div class="spinner"></div>抓取資料中...</div>`;
  });

  // 台股：Yahoo Finance，可以並行
  const twAll = [...TW_STOCKS, ...TW_ETFS];
  await Promise.all(twAll.map(async (s) => {
    const q = await fetchTWQuote(s.symbol);
    if (q) stockData[s.symbol] = q;
  }));

  // 美股：Finnhub，分批避免超過 rate limit
  const BATCH = 10;
  for (let i = 0; i < US_STOCKS.length; i += BATCH) {
    const batch = US_STOCKS.slice(i, i + BATCH);
    await Promise.all(batch.map(async (s) => {
      const q = await fetchUSQuote(s.symbol);
      if (q) stockData[s.symbol] = q;
    }));
    if (i + BATCH < US_STOCKS.length) await new Promise(r => setTimeout(r, 1100));
  }

  renderAll();
  updateStats();
  updateTimestamp();
  startCountdown();
}

function renderTile(stock, isTW) {
  const q = stockData[stock.symbol];
  const pct = q ? ((q.c - q.pc) / q.pc * 100) : null;
  const change = q ? (q.c - q.pc) : null;
  const size = getTileSize(stock.size);
  const color = getColor(pct);
  const pctStr = pct !== null ? `${pct >= 0 ? '+' : ''}${fmt(pct)}%` : '---';
  const priceStr = q ? fmtPrice(q.c, isTW) : '-';
  const shortSymbol = stock.symbol.replace('.TW','');

  return `
    <div class="stock-tile"
      style="background:${color}; width:${size}px; height:${size}px; flex:0 0 ${size}px"
      onmouseenter="showTooltip(event, '${stock.symbol}', '${stock.name}', ${isTW})"
      onmouseleave="hideTooltip()"
      onmousemove="moveTooltip(event)"
    >
      ${stock.etf ? '<div class="etf-badge">ETF</div>' : ''}
      <div>
        <div class="tile-symbol">${shortSymbol}</div>
        <div class="tile-name">${stock.name}</div>
      </div>
      <div>
        <div class="tile-change">${pctStr}</div>
        <div class="tile-price">${priceStr}</div>
      </div>
    </div>
  `;
}

function renderAll() {
  document.getElementById('heatmap-tw').innerHTML =
    TW_STOCKS.map(s => renderTile(s, true)).join('');
  document.getElementById('heatmap-tw-etf').innerHTML =
    TW_ETFS.map(s => renderTile(s, true)).join('');
  document.getElementById('heatmap-us').innerHTML =
    US_STOCKS.map(s => renderTile(s, false)).join('');
}

function updateStats() {
  const all = [...TW_STOCKS, ...TW_ETFS, ...US_STOCKS];
  let up = 0, down = 0, flat = 0;
  all.forEach(s => {
    const q = stockData[s.symbol];
    if (!q) return;
    const pct = (q.c - q.pc) / q.pc * 100;
    if (pct > 0.1) up++;
    else if (pct < -0.1) down++;
    else flat++;
  });
  document.getElementById('stat-up').textContent = up;
  document.getElementById('stat-down').textContent = down;
  document.getElementById('stat-flat').textContent = flat;
}

function updateTimestamp() {
  const now = new Date();
  document.getElementById('last-updated').textContent =
    `更新於 ${now.toLocaleTimeString('zh-TW')}`;
}

function startCountdown() {
  if (refreshTimer) clearInterval(refreshTimer);
  countdown = 60;
  refreshTimer = setInterval(() => {
    countdown--;
    document.getElementById('refresh-info').textContent = `${countdown}s 後更新`;
    if (countdown <= 0) {
      clearInterval(refreshTimer);
      fetchAll();
    }
  }, 1000);
}

// Tooltip
const tooltip = document.getElementById('tooltip');

function showTooltip(e, symbol, name, isTW) {
  const q = stockData[symbol];
  document.getElementById('tt-symbol').textContent = symbol.replace('.TW','');
  document.getElementById('tt-name').textContent = name;
  if (q) {
    const pct = (q.c - q.pc) / q.pc * 100;
    const change = q.c - q.pc;
    const isPos = pct >= 0;
    document.getElementById('tt-price').textContent = fmtPrice(q.c, isTW);
    document.getElementById('tt-price').className = 'tt-val';
    const chEl = document.getElementById('tt-change');
    chEl.textContent = `${change >= 0 ? '+' : ''}${fmt(change)}`;
    chEl.className = `tt-val ${isPos ? 'pos' : 'neg'}`;
    const pctEl = document.getElementById('tt-pct');
    pctEl.textContent = `${pct >= 0 ? '+' : ''}${fmt(pct)}%`;
    pctEl.className = `tt-val ${isPos ? 'pos' : 'neg'}`;
    document.getElementById('tt-open').textContent = fmtPrice(q.o, isTW);
    document.getElementById('tt-high').textContent = fmtPrice(q.h, isTW);
    document.getElementById('tt-low').textContent = fmtPrice(q.l, isTW);
  } else {
    ['tt-price','tt-change','tt-pct','tt-open','tt-high','tt-low']
      .forEach(id => { document.getElementById(id).textContent = '-'; });
  }
  tooltip.classList.add('visible');
  moveTooltip(e);
}

function hideTooltip() { tooltip.classList.remove('visible'); }

function moveTooltip(e) {
  const x = e.clientX + 16;
  const y = e.clientY - 10;
  const tw = tooltip.offsetWidth || 200;
  const th = tooltip.offsetHeight || 180;
  tooltip.style.left = (x + tw > window.innerWidth ? x - tw - 32 : x) + 'px';
  tooltip.style.top = (y + th > window.innerHeight ? y - th : y) + 'px';
}

// Tab switching
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  document.getElementById('section-tw').style.display =
    (tab === 'all' || tab === 'tw') ? '' : 'none';
  document.getElementById('section-tw-etf').style.display =
    (tab === 'all' || tab === 'tw' || tab === 'etf') ? '' : 'none';
  document.getElementById('section-us').style.display =
    (tab === 'all' || tab === 'us') ? '' : 'none';
  document.getElementById('section-macro').style.display =
    tab === 'macro' ? '' : 'none';

  if (tab === 'macro' && !macroLoaded) loadMacro();
}

// 重大事件關鍵字分類
const IMPACT_RULES = [
  // 🔴 緊急 — 最高優先
  {
    score: 10, cls: 'impact-urgent', label: '🔴 緊急',
    keywords: ['breaking','emergency','attack','missile','nuclear','explosion','assassination','coup','default','collapse','crash','halt trading']
  },
  // 🟠 Fed / 貨幣政策
  {
    score: 9, cls: 'impact-fed', label: '🏦 Fed',
    keywords: ['federal reserve','fed rate','interest rate decision','fomc','powell','rate hike','rate cut','basis points','bps','monetary policy','inflation data','cpi report','pce']
  },
  // 🔴 地緣政治 / 戰爭
  {
    score: 8, cls: 'impact-geo', label: '⚔️ 地緣政治',
    keywords: ['iran','israel','ukraine','russia','china taiwan','south china sea','north korea','war','ceasefire','airstrike','sanction','embargo','military','troops','nato','conflict']
  },
  // 🟠 貿易 / 關稅
  {
    score: 7, cls: 'impact-trade', label: '🚢 貿易',
    keywords: ['tariff','trade war','export ban','import restriction','supply chain','semiconductor ban','chip restriction','huawei','trade deal']
  },
  // 🟡 總體經濟
  {
    score: 6, cls: 'impact-macro', label: '📊 總經',
    keywords: ['gdp','recession','unemployment','jobs report','nonfarm','payroll','retail sales','manufacturing','pmi','consumer confidence','housing','debt ceiling','budget']
  },
  // 🟡 財報 / 企業
  {
    score: 5, cls: 'impact-earnings', label: '💹 財報',
    keywords: ['earnings','revenue','profit','quarterly result','guidance','outlook','beat','miss','ipo','acquisition','merger','layoff','restructure']
  },
  // ⚪ 一般
  {
    score: 1, cls: 'impact-low', label: '一般',
    keywords: []
  },
];

function getImpact(title) {
  const t = title.toLowerCase();
  for (const rule of IMPACT_RULES) {
    if (rule.keywords.length === 0) return rule;
    if (rule.keywords.some(k => t.includes(k))) return rule;
  }
  return IMPACT_RULES[IMPACT_RULES.length - 1];
}

async function loadNews() {
  const newsEl = document.getElementById('news-list');
  const proxy = 'https://api.allorigins.win/raw?url=';
  const allItems = [];

  await Promise.all(RSS_FEEDS.map(async (feed) => {
    try {
      const r = await fetch(proxy + encodeURIComponent(feed.url));
      if (!r.ok) return;
      const text = await r.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(text, 'text/xml');
      const items = [...xml.querySelectorAll('item')].slice(0, feed.limit);
      items.forEach(item => {
        const title   = item.querySelector('title')?.textContent?.trim() || '';
        const link    = item.querySelector('link')?.textContent?.trim() || '#';
        const desc    = item.querySelector('description')?.textContent?.replace(/<[^>]+>/g,'').trim().slice(0,120) || '';
        const pubDate = item.querySelector('pubDate')?.textContent || '';
        const dateObj = pubDate ? new Date(pubDate) : new Date(0);
        const dateStr = pubDate ? dateObj.toLocaleString('zh-TW', {
          month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
        }) : '';
        if (!title) return;
        const impact = getImpact(title + ' ' + desc);
        allItems.push({ title, link, desc, date: dateStr, dateObj, source: feed.source, badge: feed.badge, impact });
      });
    } catch { /* skip failed feed */ }
  }));

  if (allItems.length === 0) {
    newsEl.innerHTML = `<div class="loading-overlay" style="color:var(--muted)">⚠️ 新聞載入失敗，請稍後再試</div>`;
    return;
  }

  // 去重（同標題）
  const seen = new Set();
  const unique = allItems.filter(item => {
    const key = item.title.slice(0, 60);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  // 排序：分數高的優先，同分數按時間新舊
  unique.sort((a, b) => b.impact.score - a.impact.score || b.dateObj - a.dateObj);

  // 重大事件（score >= 8）獨立置頂
  const breaking = unique.filter(i => i.impact.score >= 8);
  const normal   = unique.filter(i => i.impact.score < 8);

  let html = '';

  if (breaking.length > 0) {
    html += `<div class="news-section-label">⚡ 重大事件 · 置頂</div>`;
    html += breaking.map(item => renderNewsItem(item, true)).join('');
    html += `<div class="news-section-label" style="margin-top:20px">📰 最新財經新聞</div>`;
  }

  html += normal.map(item => renderNewsItem(item, false)).join('');
  newsEl.innerHTML = html;
}

function renderNewsItem(item, isBreaking) {
  return `
    <a class="news-item ${isBreaking ? 'news-breaking' : ''}" href="${item.link}" target="_blank" rel="noopener">
      <div class="news-left">
        <span class="news-source-badge ${item.badge}">${item.source}</span>
        <span class="news-impact ${item.impact.cls}">${item.impact.label}</span>
      </div>
      <div class="news-content">
        <div class="news-title">${item.title}</div>
        ${item.desc ? `<div class="news-desc">${item.desc}...</div>` : ''}
        <div class="news-meta">${item.date}</div>
      </div>
    </a>
  `;
}
