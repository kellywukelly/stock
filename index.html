<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股市熱力圖 · StockMap</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg:#0a0d12; --surface:#111520; --surface2:#161b2e;
  --border:#1e2535; --text:#e2e8f0; --muted:#64748b;
  --gain5:#00c853; --gain3:#43a047; --gain1:#2e7d32;
  --flat:#263238;
  --loss1:#b71c1c; --loss3:#c62828; --loss5:#e53935;
  --accent:#3b82f6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;}

/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;}
.logo{font-size:18px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center;gap:8px;}
.logo-dot{width:8px;height:8px;background:var(--gain5);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}
.header-right{display:flex;align-items:center;gap:16px;}
#refresh-info,#last-updated{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.refresh-btn{background:transparent;border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;transition:.2s;}
.refresh-btn:hover{border-color:var(--accent);background:rgba(59,130,246,.08);}

/* ── Stats bar ── */
.stats-bar{display:flex;align-items:center;gap:24px;padding:10px 24px;background:var(--surface);border-bottom:1px solid var(--border);font-size:12px;flex-wrap:wrap;}
.stat-item{display:flex;gap:6px;align-items:center;}
.stat-label{color:var(--muted);}
.stat-val{font-family:'JetBrains Mono',monospace;font-weight:600;}
.stat-val.pos{color:var(--gain5);} .stat-val.neg{color:var(--loss5);}

/* ── Tabs ── */
.tabs{display:flex;gap:4px;padding:16px 24px 0;border-bottom:1px solid var(--border);background:var(--bg);overflow-x:auto;}
.tab{padding:8px 18px;border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border:1px solid transparent;border-bottom:none;transition:.2s;background:transparent;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.active{background:var(--surface);border-color:var(--border);color:var(--text);position:relative;bottom:-1px;}

/* ── Legend ── */
.legend{display:flex;align-items:center;gap:6px;padding:10px 24px;font-size:11px;color:var(--muted);background:var(--bg);border-bottom:1px solid var(--border);}
.legend-bar{display:flex;border-radius:4px;overflow:hidden;height:10px;}
.legend-bar span{width:30px;display:inline-block;}
.legend-label{font-family:'JetBrains Mono',monospace;font-size:11px;}

/* ── Main ── */
main{flex:1;padding:20px 24px;}
.section-title{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.heatmap-container{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:28px;min-height:80px;}

/* ── Stock Tile ── */
.stock-tile{
  border-radius:8px;padding:8px 10px;cursor:pointer;
  transition:transform .15s,box-shadow .15s,filter .15s;
  display:flex;flex-direction:column;justify-content:space-between;
  position:relative;overflow:hidden;min-width:90px;min-height:105px;
}
.stock-tile::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.03);pointer-events:none;}
.stock-tile:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.5);filter:brightness(1.12);z-index:10;}

.tile-top{display:flex;align-items:center;gap:5px;margin-bottom:2px;}
.tile-logo{width:16px;height:16px;border-radius:3px;object-fit:contain;background:rgba(255,255,255,.1);flex-shrink:0;}
.tile-logo-placeholder{width:16px;height:16px;border-radius:3px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:rgba(255,255,255,.7);flex-shrink:0;}
.tile-symbol{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,.95);letter-spacing:.3px;}
.tile-name{font-size:10px;color:rgba(255,255,255,.55);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}

/* sparkline */
.tile-spark{width:100%;height:24px;margin:2px 0;}
.tile-spark svg{width:100%;height:100%;}

.tile-bottom{}
.tile-change{font-size:16px;font-weight:700;color:rgba(255,255,255,.95);font-family:'JetBrains Mono',monospace;}
.tile-price{font-size:11px;color:rgba(255,255,255,.55);font-family:'JetBrains Mono',monospace;}
.etf-badge{position:absolute;top:5px;right:5px;font-size:7px;font-weight:700;background:rgba(255,255,255,.15);border-radius:3px;padding:1px 4px;letter-spacing:.5px;}

/* ── Tooltip ── */
#tooltip{position:fixed;background:#1a2035;border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;pointer-events:none;z-index:999;opacity:0;transition:opacity .15s;min-width:200px;box-shadow:0 16px 40px rgba(0,0,0,.5);}
#tooltip.visible{opacity:1;}
.tt-symbol{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;margin-bottom:4px;}
.tt-name{color:var(--muted);font-size:11px;margin-bottom:10px;}
.tt-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.tt-label{color:var(--muted);}
.tt-val{font-family:'JetBrains Mono',monospace;font-weight:600;}
.tt-val.pos{color:var(--gain5);} .tt-val.neg{color:var(--loss5);}

/* ── Detail Panel (side drawer) ── */
#detail-panel{
  position:fixed;top:0;right:-480px;width:460px;max-width:95vw;height:100vh;
  background:var(--surface2);border-left:1px solid var(--border);
  z-index:500;transition:right .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
#detail-panel.open{right:0;}
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:499;opacity:0;pointer-events:none;transition:opacity .3s;}
.panel-overlay.visible{opacity:1;pointer-events:auto;}

.panel-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.panel-close{margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s;}
.panel-close:hover{border-color:var(--text);color:var(--text);}
.panel-logo-big{width:40px;height:40px;border-radius:8px;object-fit:contain;background:rgba(255,255,255,.08);}
.panel-logo-placeholder{width:40px;height:40px;border-radius:8px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--text);}
.panel-title-block{}
.panel-symbol{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.panel-name{font-size:12px;color:var(--muted);margin-top:2px;}

.panel-body{flex:1;overflow-y:auto;padding:20px 24px;}
.panel-price-row{display:flex;align-items:baseline;gap:12px;margin-bottom:20px;}
.panel-price{font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.panel-change{font-size:16px;font-weight:600;font-family:'JetBrains Mono',monospace;}
.panel-change.pos{color:var(--gain5);} .panel-change.neg{color:var(--loss5);}

.panel-chart{width:100%;height:80px;margin-bottom:20px;}
.panel-chart svg{width:100%;height:100%;}

.panel-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.panel-stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.panel-stat-label{font-size:10px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;}
.panel-stat-value{font-size:14px;font-weight:600;font-family:'JetBrains Mono',monospace;}

.panel-section{margin-bottom:20px;}
.panel-section-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.panel-desc{font-size:13px;line-height:1.7;color:#94a3b8;}
.panel-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.panel-tag{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3);}

/* ── Macro section ── */
.macro-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:28px;}
.macro-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;gap:5px;transition:.2s;cursor:pointer;}
.macro-card:hover{border-color:var(--accent);background:rgba(59,130,246,.05);transform:translateY(-2px);}
.macro-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.macro-value{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.macro-change{font-size:12px;font-family:'JetBrains Mono',monospace;font-weight:600;}
.macro-change.pos{color:var(--gain5);} .macro-change.neg{color:var(--loss5);} .macro-change.neu{color:var(--muted);}
.macro-desc{font-size:10px;color:var(--muted);}
.macro-hint{font-size:9px;color:rgba(59,130,246,.6);margin-top:2px;}

/* ── Macro detail panel ── */
#macro-panel{
  position:fixed;top:0;right:-480px;width:460px;max-width:95vw;height:100vh;
  background:var(--surface2);border-left:1px solid var(--border);
  z-index:500;transition:right .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
#macro-panel.open{right:0;}
.macro-panel-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.macro-panel-icon{font-size:32px;}
.macro-panel-close{margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s;}
.macro-panel-close:hover{border-color:var(--text);color:var(--text);}
.macro-panel-body{flex:1;overflow-y:auto;padding:20px 24px;}
.macro-explain-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px;}
.macro-explain-title{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
.macro-explain-text{font-size:13px;line-height:1.75;color:#94a3b8;}
.macro-impact-list{margin-top:8px;padding-left:16px;}
.macro-impact-list li{font-size:13px;color:#94a3b8;line-height:1.8;margin-bottom:2px;}
.macro-threshold{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.threshold-item{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;}

/* ── News ── */
.news-list{display:flex;flex-direction:column;gap:8px;}
.news-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;gap:14px;align-items:flex-start;text-decoration:none;color:var(--text);transition:.2s;cursor:pointer;}
.news-item:hover{border-color:var(--accent);background:rgba(59,130,246,.05);}
.news-breaking{border-color:rgba(239,68,68,.4)!important;background:rgba(239,68,68,.04)!important;}
.news-breaking:hover{border-color:rgba(239,68,68,.7)!important;background:rgba(239,68,68,.08)!important;}
.news-left{display:flex;flex-direction:column;gap:4px;align-items:flex-start;flex-shrink:0;}
.news-content{flex:1;}
.news-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:4px;}
.news-desc{font-size:11px;color:var(--muted);line-height:1.5;margin:3px 0;}
.news-meta{font-size:11px;color:var(--muted);}
.news-section-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:8px 0 10px;display:flex;align-items:center;gap:8px;}
.news-section-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* badges */
.news-source-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.news-impact{font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;}
.badge-yahoo{background:#6001d2;color:#fff;}
.badge-mw{background:#000;color:#fff;}
.badge-investing{background:#e84040;color:#fff;}
.badge-fed{background:#1a3a5c;color:#7eb8e8;border:1px solid #2a5a8c;}
.impact-urgent{background:rgba(239,68,68,.25);color:#f87171;}
.impact-fed{background:rgba(59,130,246,.2);color:#60a5fa;}
.impact-geo{background:rgba(251,146,60,.2);color:#fb923c;}
.impact-trade{background:rgba(234,179,8,.2);color:#facc15;}
.impact-macro{background:rgba(168,85,247,.2);color:#c084fc;}
.impact-earnings{background:rgba(34,197,94,.2);color:#4ade80;}
.impact-low{background:rgba(100,116,139,.2);color:#94a3b8;}

/* ── Loading ── */
.loading-overlay{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--muted);font-size:13px;width:100%;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>股市熱力圖</div>

</div>

<div class="tabs">

</div>

  <span class="legend-label">0%</span><span style="flex:1"></span>
  <span class="legend-label">-5%</span>
  <span style="margin-left:16px;color:var(--muted);font-size:11px">點擊格子查看公司介紹</span>
</div>

<main id="main-content">
  <div id="section-tw">
    <div class="section-title">台股 · 個股</div>
    <div class="heatmap-container" id="heatmap-tw"></div>
  </div>
  <div id="section-tw-etf">
    <div class="section-title">台股 · ETF</div>

  <div id="section-us">

    <div class="section-title" style="margin-top:8px">財經新聞</div>
    <div id="news-list" class="news-list"><div class="loading-overlay"><div class="spinner"></div>載入新聞中...</div></div>
  </div>
</main>

<!-- Stock detail panel -->
<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<div id="detail-panel">
  <div class="panel-header">
    <div id="panel-logo-wrap"></div>
    <div class="panel-title-block">
      <div class="panel-symbol" id="panel-symbol"></div>
      <div class="panel-name" id="panel-name"></div>

    <button class="panel-close" onclick="closePanel()">✕</button>

    <div class="panel-price-row">

      <div class="panel-change" id="panel-change"></div>
    </div>
    <div class="panel-chart" id="panel-chart"></div>
    <div class="panel-stats" id="panel-stats"></div>
    <div class="panel-section">
      <div class="panel-section-title">公司介紹</div>
      <div class="panel-desc" id="panel-desc"></div>
      <div class="panel-tags" id="panel-tags"></div>
    </div>
  </div>
</div>

<!-- Macro detail panel -->
<div id="macro-panel">
  <div class="macro-panel-header">
    <div class="macro-panel-icon" id="mpanel-icon"></div>
    <div>
      <div class="panel-symbol" id="mpanel-title"></div>
      <div class="panel-name" id="mpanel-subtitle"></div>
    </div>
    <button class="macro-panel-close" onclick="closeMacroPanel()">✕</button>
  </div>
  <div class="macro-panel-body" id="mpanel-body"></div>
</div>

<!-- Tooltip -->
<div id="tooltip">
  <div class="tt-symbol" id="tt-symbol"></div>
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-row"><span class="tt-label">現價</span><span class="tt-val" id="tt-price"></span></div>

  <div class="tt-row"><span class="tt-label">最低</span><span class="tt-val" id="tt-low"></span></div>
</div>

function getColor(pct) {

  if (pct >= 5)  return '#00c853';
  if (pct >= 3)  return '#43a047';
  if (pct >= 1)  return '#2e7d32';
  if (pct >= -1) return '#263238';
  if (pct >= -3) return '#b71c1c';
  if (pct >= -5) return '#c62828';
  return '#e53935';
}

// ── Yahoo Finance proxy ──
const YF_BASE = 'https://query1.finance.yahoo.com/v8/finance/chart/';
const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

async function yFetch(symbol, params='?interval=1d&range=2d') {
  const url = YF_BASE + symbol + params;
  for (const build of PROXIES) {
    try {
      const r = await fetch(build(url), {signal: AbortSignal.timeout(8000)});
      if (!r.ok) continue;
      const d = await r.json();
      const res = d?.chart?.result?.[0];
      if (res) return res;
    } catch { continue; }
  }
  return null;
}

async function fetchTWQuote(symbol) {
  const res = await yFetch(symbol);
  if (!res) return null;
  const meta = res.meta;
  if (!meta?.regularMarketPrice) return null;
  const c  = meta.regularMarketPrice;
  const pc = meta.chartPreviousClose || meta.previousClose || c;
  return { c, pc, o: meta.regularMarketOpen||c, h: meta.regularMarketDayHigh||c, l: meta.regularMarketDayLow||c };
}

async function fetchSparkline(symbol) {
  // Get 5-day data for sparkline
  const res = await yFetch(symbol, '?interval=1h&range=5d');
  if (!res) return null;
  const closes = res.indicators?.quote?.[0]?.close;
  if (!closes) return null;
  return closes.filter(v => v != null).slice(-30);
}

// ── Finnhub ──
async function fetchUSQuote(symbol) {
  try {
    const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${API_KEY}`);
    const d = await r.json();
    if (d?.c && d.c !== 0) return d;
  } catch {}
  return null;
}

// ── Sparkline SVG ──
function makeSpark(prices, isPos) {
  if (!prices || prices.length < 2) return '<svg></svg>';
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = max - min || 1;
  const w = 100, h = 20;
  const pts = prices.map((p,i) => {
    const x = (i / (prices.length-1)) * w;
    const y = h - ((p - min) / range) * h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const color = isPos ? '#00c853' : '#e53935';
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </svg>`;
}

function makePanelChart(prices, isPos) {
  if (!prices || prices.length < 2) return '';
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = max - min || 1;
  const w = 400, h = 70;
  const pts = prices.map((p,i) => {
    const x = (i / (prices.length-1)) * w;
    const y = h - ((p - min) / range) * (h-4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const ptsStr = pts.join(' ');
  const first = pts[0], last = pts[pts.length-1];
  const color = isPos ? '#00c853' : '#e53935';
  const fillPts = `${first.split(',')[0]},${h} ` + ptsStr + ` ${last.split(',')[0]},${h}`;
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="${fillPts}" fill="url(#sg)"/>
    <polyline points="${ptsStr}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

  return `<img class="${cls}" src="https://logo.clearbit.com/${domain}" 
    onerror="this.style.display='none'" 
    width="${size}" height="${size}" loading="lazy">`;
}

// ── Fetch all ──
async function fetchAll() {
  ['heatmap-tw','heatmap-tw-etf','heatmap-us'].forEach(id => {
    document.getElementById(id).innerHTML = `<div class="loading-overlay"><div class="spinner"></div>抓取資料中...</div>`;
  });

  // TW stocks (Yahoo)
  const twAll = [...TW_STOCKS, ...TW_ETFS];
  await Promise.all(twAll.map(async s => {
    const q = await fetchTWQuote(s.symbol);
    if (q) stockData[s.symbol] = q;
  }));

  // US stocks (Finnhub) in batches
  const BATCH = 10;
  for (let i = 0; i < US_STOCKS.length; i += BATCH) {
    await Promise.all(US_STOCKS.slice(i, i+BATCH).map(async s => {
      const q = await fetchUSQuote(s.symbol);
      if (q) stockData[s.symbol] = q;
    }));
    if (i + BATCH < US_STOCKS.length) await new Promise(r => setTimeout(r, 1100));
  }

  renderAll();
  updateStats();
  updateTimestamp();
  startCountdown();
  // Fetch sparklines in background
  fetchSparklines();
}

async function fetchSparklines() {
  const all = [...TW_STOCKS, ...TW_ETFS, ...US_STOCKS];
  await Promise.all(all.map(async s => {
    const data = await fetchSparkline(s.symbol);
    if (data) {
      sparkData[s.symbol] = data;
      // Update tile sparkline
      const el = document.getElementById(`spark-${s.symbol.replace(/[^a-zA-Z0-9]/g,'_')}`);
      if (el) {
        const q = stockData[s.symbol];
        const pct = q ? (q.c - q.pc) / q.pc * 100 : 0;
        el.innerHTML = makeSpark(data, pct >= 0);
      }
    }
  }));
}

// ── Render ──
function renderTile(stock, isTW) {
  const q = stockData[stock.symbol];
  const pct = q ? (q.c - q.pc) / q.pc * 100 : null;
  const size = getTileSize(stock.size);
  const color = getColor(pct);
  const pctStr = pct != null ? `${pct>=0?'+':''}${fmt(pct)}%` : '---';
  const priceStr = q ? fmtPrice(q.c, isTW) : '-';
  const shortSym = stock.symbol.replace('.TW','');
  const sparkId = `spark-${stock.symbol.replace(/[^a-zA-Z0-9]/g,'_')}`;
  const spark = sparkData[stock.symbol] ? makeSpark(sparkData[stock.symbol], pct>=0) : '';

  return `<div class="stock-tile" 
    style="background:${color};width:${size}px;height:${size+28}px;flex:0 0 ${size}px"
    onclick="openPanel('${stock.symbol}','${stock.name}',${isTW})"
    onmouseenter="showTT(event,'${stock.symbol}','${stock.name}',${isTW})"
    onmouseleave="hideTT()" onmousemove="moveTT(event)">
    ${stock.etf?'<div class="etf-badge">ETF</div>':''}
    <div class="tile-top">
      ${logoEl(stock.domain, true)}
      <div class="tile-symbol">${shortSym}</div>
    </div>
    <div class="tile-name">${stock.name}</div>
    <div class="tile-spark" id="${sparkId}">${spark}</div>
    <div class="tile-bottom">
      <div class="tile-change">${pctStr}</div>
      <div class="tile-price">${priceStr}</div>
    </div>
  </div>`;
}

function renderAll() {
  document.getElementById('heatmap-tw').innerHTML = TW_STOCKS.map(s=>renderTile(s,true)).join('');
  document.getElementById('heatmap-tw-etf').innerHTML = TW_ETFS.map(s=>renderTile(s,true)).join('');
  document.getElementById('heatmap-us').innerHTML = US_STOCKS.map(s=>renderTile(s,false)).join('');
}

function updateStats() {
  const all = [...TW_STOCKS,...TW_ETFS,...US_STOCKS];
  let up=0,dn=0,fl=0;
  all.forEach(s=>{
    const q=stockData[s.symbol]; if(!q)return;
    const p=(q.c-q.pc)/q.pc*100;
    if(p>0.1)up++; else if(p<-0.1)dn++; else fl++;
  });
  document.getElementById('stat-up').textContent=up;
  document.getElementById('stat-down').textContent=dn;
  document.getElementById('stat-flat').textContent=fl;
}

function updateTimestamp() {
  document.getElementById('last-updated').textContent =
    `更新於 ${new Date().toLocaleTimeString('zh-TW')}`;
}

function startCountdown() {
  if(refreshTimer) clearInterval(refreshTimer);
  countdown=60;
  refreshTimer=setInterval(()=>{
    countdown--;
    document.getElementById('refresh-info').textContent=`${countdown}s 後更新`;
    if(countdown<=0){clearInterval(refreshTimer);fetchAll();}
  },1000);
}

// ── Tooltip ──
const tt = document.getElementById('tooltip');
function showTT(e,sym,name,isTW){
  const q=stockData[sym];
  document.getElementById('tt-symbol').textContent=sym.replace('.TW','');
  document.getElementById('tt-name').textContent=name;
  if(q){
    const pct=(q.c-q.pc)/q.pc*100, pos=pct>=0;
    document.getElementById('tt-price').textContent=fmtPrice(q.c,isTW);
    const pe=document.getElementById('tt-pct');
    pe.textContent=`${pos?'+':''}${fmt(pct)}%`; pe.className=`tt-val ${pos?'pos':'neg'}`;
    document.getElementById('tt-high').textContent=fmtPrice(q.h,isTW);
    document.getElementById('tt-low').textContent=fmtPrice(q.l,isTW);
  } else {
    ['tt-price','tt-pct','tt-high','tt-low'].forEach(id=>document.getElementById(id).textContent='-');
  }
  tt.classList.add('visible'); moveTT(e);
}
function hideTT(){tt.classList.remove('visible');}
function moveTT(e){
  const x=e.clientX+16,y=e.clientY-10;
  const tw=tt.offsetWidth||200,th=tt.offsetHeight||160;
  tt.style.left=(x+tw>window.innerWidth?x-tw-32:x)+'px';
  tt.style.top=(y+th>window.innerHeight?y-th:y)+'px';
}

// ── Stock detail panel ──
function openPanel(sym, name, isTW) {
  hideTT();
  const q = stockData[sym];
  const pct = q ? (q.c-q.pc)/q.pc*100 : null;
  const isPos = pct >= 0;
  const info = COMPANY_INFO[sym];
  const stock = [...TW_STOCKS,...TW_ETFS,...US_STOCKS].find(s=>s.symbol===sym);

  // Header
  document.getElementById('panel-symbol').textContent = sym.replace('.TW','');
  document.getElementById('panel-name').textContent = name;
  const logoWrap = document.getElementById('panel-logo-wrap');
  if (stock?.domain) {
    logoWrap.innerHTML = `<img class="panel-logo-big" src="https://logo.clearbit.com/${stock.domain}" 
      onerror="this.outerHTML='<div class=panel-logo-placeholder>${name.slice(0,1)}</div>'"
      width="40" height="40">`;
  } else {
    logoWrap.innerHTML = `<div class="panel-logo-placeholder">${name.slice(0,1)}</div>`;
  }

  // Price
  document.getElementById('panel-price').textContent = q ? fmtPrice(q.c, isTW) : '-';
  const chEl = document.getElementById('panel-change');
  if (q) {
    chEl.textContent = `${isPos?'+':''}${fmt(pct)}%`;
    chEl.className = `panel-change ${isPos?'pos':'neg'}`;
  } else { chEl.textContent = ''; }

  // Chart
  const spark = sparkData[sym];
  document.getElementById('panel-chart').innerHTML = spark ? makePanelChart(spark, isPos) : '';

  // Stats
  document.getElementById('panel-stats').innerHTML = q ? `
    <div class="panel-stat"><div class="panel-stat-label">開盤</div><div class="panel-stat-value">${fmtPrice(q.o,isTW)}</div></div>
    <div class="panel-stat"><div class="panel-stat-label">最高</div><div class="panel-stat-value" style="color:var(--gain5)">${fmtPrice(q.h,isTW)}</div></div>
    <div class="panel-stat"><div class="panel-stat-label">最低</div><div class="panel-stat-value" style="color:var(--loss5)">${fmtPrice(q.l,isTW)}</div></div>
    <div class="panel-stat"><div class="panel-stat-label">昨收</div><div class="panel-stat-value">${fmtPrice(q.pc,isTW)}</div></div>
  ` : '';

  // Description
  document.getElementById('panel-desc').textContent = info?.desc || '暫無公司資料。';
  document.getElementById('panel-tags').innerHTML = (info?.tags||[]).map(t=>`<span class="panel-tag">${t}</span>`).join('');

  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('panel-overlay').classList.add('visible');
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('visible');
}

// ── Macro panel ──
function openMacroPanel(symbol) {
  const ex = MACRO_EXPLAIN[symbol];
  const m = MACRO_SYMBOLS.find(m=>m.symbol===symbol);
  if (!ex || !m) return;

  document.getElementById('mpanel-icon').textContent = m.icon;
  document.getElementById('mpanel-title').textContent = ex.title;
  document.getElementById('mpanel-subtitle').textContent = m.desc;

  let html = `<div class="macro-explain-block">
    <div class="macro-explain-title">📖 什麼是 ${m.label}？</div>
    <div class="macro-explain-text">${ex.intro}</div>
  </div>`;

  ex.sections.forEach(s => {
    html += `<div class="macro-explain-block">
      <div class="macro-explain-title">${s.title}</div>`;
    if (s.text) html += `<div class="macro-explain-text">${s.text}</div>`;
    if (s.items) html += `<ul class="macro-impact-list">${s.items.map(i=>`<li>${i}</li>`).join('')}</ul>`;
    html += '</div>';
  });

  document.getElementById('mpanel-body').innerHTML = html;
  document.getElementById('macro-panel').classList.add('open');
  document.getElementById('panel-overlay').classList.add('visible');
}

function closeMacroPanel() {
  document.getElementById('macro-panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('visible');
}

// ── Tab switching ──
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('section-tw').style.display      = (tab==='all'||tab==='tw') ? '':'none';
  document.getElementById('section-tw-etf').style.display  = (tab==='all'||tab==='tw'||tab==='etf') ? '':'none';
  document.getElementById('section-us').style.display      = (tab==='all'||tab==='us') ? '':'none';
  document.getElementById('section-macro').style.display   = tab==='macro' ? '':'none';
  if (tab==='macro' && !macroLoaded) loadMacro();
}

// ── Macro ──
async function loadMacro() {
  macroLoaded = true;
  const grid = document.getElementById('macro-grid');
  const results = await Promise.all(MACRO_SYMBOLS.map(async m => {
    const q = await fetchTWQuote(m.symbol);
    return {...m, q};
  }));

  grid.innerHTML = results.map(m => {
    const q=m.q, val=q?q.c:null, pct=q?(q.c-q.pc)/q.pc*100:null;
    const cls=pct==null?'neu':(pct>0?'pos':'neg');
    const pctStr=pct!=null?`${pct>0?'+':''}${pct.toFixed(2)}%`:'-';
    const valStr=val!=null?(m.unit==='$'?`$${val.toLocaleString('en',{maximumFractionDigits:2})}`
      :m.unit==='%'?`${val.toFixed(2)}%`:val.toFixed(2)):'-';
    const hasExplain = !!MACRO_EXPLAIN[m.symbol];
    return `<div class="macro-card" onclick="${hasExplain?`openMacroPanel('${m.symbol}')`:''}" 
      style="${hasExplain?'':'cursor:default'}">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:18px">${m.icon}</span>
        <div class="macro-label">${m.label}</div>
      </div>
      <div class="macro-value">${valStr}</div>
      <div class="macro-change ${cls}">${pctStr}</div>
      <div class="macro-desc">${m.desc}</div>
      ${hasExplain?'<div class="macro-hint">👆 點擊查看說明</div>':''}
    </div>`;
  }).join('');

  loadNews();
}

// ── News ──
const RSS_FEEDS = [
  {url:'https://feeds.finance.yahoo.com/rss/2.0/headline?s=^GSPC,^IXIC,NVDA,TSLA,AAPL&region=US&lang=en-US',source:'Yahoo Finance',badge:'badge-yahoo',limit:12},
  {url:'https://feeds.content.dowjones.io/public/rss/mw_realtimeheadlines',source:'MarketWatch',badge:'badge-mw',limit:10},
  {url:'https://feeds.content.dowjones.io/public/rss/mw_topstories',source:'MarketWatch',badge:'badge-mw',limit:8},
  {url:'https://www.federalreserve.gov/feeds/press_all.xml',source:'Fed 官方',badge:'badge-fed',limit:5},
];

const IMPACT_RULES = [
  {score:10,cls:'impact-urgent',label:'🔴 緊急',keywords:['breaking','emergency','attack','missile','nuclear','explosion','assassination','coup','default','collapse','crash','halt trading']},
  {score:9,cls:'impact-fed',label:'🏦 Fed',keywords:['federal reserve','fed rate','interest rate decision','fomc','powell','rate hike','rate cut','basis points','monetary policy','cpi','pce','inflation','jackson hole']},
  {score:8,cls:'impact-geo',label:'⚔️ 地緣政治',keywords:['iran','israel','ukraine','russia','china taiwan','south china sea','north korea','war','ceasefire','airstrike','sanction','embargo','military strike','troops','nato','conflict','middle east','gulf']},
  {score:7,cls:'impact-trade',label:'🚢 貿易',keywords:['tariff','trade war','export ban','import restriction','supply chain','semiconductor ban','chip restriction','huawei','trade deal']},
  {score:6,cls:'impact-macro',label:'📊 總經',keywords:['gdp','recession','unemployment','jobs report','nonfarm','payroll','retail sales','pmi','consumer confidence','housing','debt ceiling','budget','fiscal','treasury']},
  {score:5,cls:'impact-earnings',label:'💹 財報',keywords:['earnings','revenue','profit','quarterly','guidance','outlook','beat','miss','ipo','acquisition','merger','layoff','buyback']},
  {score:1,cls:'impact-low',label:'一般',keywords:[]},
];

function getImpact(text){
  const t=text.toLowerCase();
  for(const rule of IMPACT_RULES){
    if(rule.keywords.length===0) return rule;
    if(rule.keywords.some(k=>t.includes(k))) return rule;
  }
  return IMPACT_RULES[IMPACT_RULES.length-1];
}

async function fetchRSS(url){
  for(const build of PROXIES){
    try{
      const r=await fetch(build(url),{signal:AbortSignal.timeout(8000)});
      if(!r.ok) continue;
      const t=await r.text();
      if(t&&t.length>100) return t;
    }catch{continue;}
  }
  return null;
}

async function loadNews(){
  const newsEl=document.getElementById('news-list');
  newsEl.innerHTML=`<div class="loading-overlay"><div class="spinner"></div>載入新聞中...</div>`;
  const all=[];
  await Promise.all(RSS_FEEDS.map(async feed=>{
    const text=await fetchRSS(feed.url); if(!text)return;
    try{
      const xml=new DOMParser().parseFromString(text,'text/xml');
      [...xml.querySelectorAll('item')].slice(0,feed.limit).forEach(item=>{
        const title=(item.querySelector('title')?.textContent||'').trim();
        const link=(item.querySelector('link')?.textContent||'#').trim();
        const desc=(item.querySelector('description')?.textContent||'').replace(/<[^>]+>/g,'').replace(/&nbsp;/g,' ').trim().slice(0,130);
        const pubDate=item.querySelector('pubDate')?.textContent||'';
        const dateObj=pubDate?new Date(pubDate):new Date(0);
        const dateStr=pubDate?dateObj.toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
        if(!title||title.length<5)return;
        all.push({title,link,desc,date:dateStr,dateObj,source:feed.source,badge:feed.badge,impact:getImpact(title+' '+desc)});
      });
    }catch{}
  }));

  if(all.length===0){
    newsEl.innerHTML=`<div style="padding:32px;text-align:center;color:var(--muted)">
      <div style="font-size:32px;margin-bottom:12px">📡</div>
      <div style="font-size:14px;margin-bottom:6px">新聞載入失敗</div>
      <div style="font-size:12px">proxy 不穩定，請稍後再試</div>
      <button onclick="macroLoaded=false;loadMacro()" style="margin-top:16px;padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px">重新載入</button>
    </div>`; return;
  }

  const seen=new Set();
  const unique=all.filter(i=>{const k=i.title.slice(0,50).toLowerCase();if(seen.has(k))return false;seen.add(k);return true;});
  unique.sort((a,b)=>b.impact.score-a.impact.score||b.dateObj-a.dateObj);

  const breaking=unique.filter(i=>i.impact.score>=8);
  const normal=unique.filter(i=>i.impact.score<8);

  let html=`<div style="font-size:11px;color:var(--muted);margin-bottom:12px">共 ${unique.length} 則新聞</div>`;
  if(breaking.length>0){
    html+=`<div class="news-section-label">⚡ 重大事件 · 置頂</div>`;
    html+=breaking.map(i=>newsItem(i,true)).join('');
    html+=`<div class="news-section-label" style="margin-top:20px">📰 最新財經新聞</div>`;
  } else {
    html+=`<div class="news-section-label">📰 最新財經新聞</div>`;
  }
  html+=normal.map(i=>newsItem(i,false)).join('');
  newsEl.innerHTML=html;
}

function newsItem(item,isBreaking){
  return `<a class="news-item ${isBreaking?'news-breaking':''}" href="${item.link}" target="_blank" rel="noopener">
    <div class="news-left">
      <span class="news-source-badge ${item.badge}">${item.source}</span>
      <span class="news-impact ${item.impact.cls}">${item.impact.label}</span>
    </div>
    <div class="news-content">
      <div class="news-title">${item.title}</div>
      ${item.desc?`<div class="news-desc">${item.desc}…</div>`:''}
      <div class="news-meta">${item.date}</div>
    </div>
  </a>`;
}

// ── ESC to close panels ──
document.addEventListener('keydown', e => {
  if(e.key==='Escape'){ closePanel(); closeMacroPanel(); }
});

// ── Init ──
fetchAll();
</script>
